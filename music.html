<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Music Card</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#050816;
}

.box{
    width:500px;
    height:750px;
    background:#111827;
    border-radius:30px;
    padding:40px;
    color:white;
    box-shadow:0 0 25px rgba(29,185,84,0.3);
}

/* LOGO */

.logo{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    margin-bottom:30px;
}

.logo img{
    width:45px;
    height:45px;
}

.logo h1{
    color:#1DB954;
    font-size:40px;
    text-shadow:0 0 15px #1DB954;
}

/* ALBUM */

.album-box{
    width:300px;
    height:300px;
    margin:0 auto;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(29,185,84,0.4);
}

.album-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* SONG */

.name{
    margin-top:25px;
}

.name h2{
    text-align:center;
    font-size:30px;
    margin-bottom:10px;
}

.name p{
    text-align:center;
    color:#bdbdbd;
    font-size:16px;
}

/* PROGRESS BAR */

.progress-bar{
    width:300px;
    height:6px;
    background:#444;
    border-radius:10px;
    margin:30px auto 10px;
}

.progress{
    width:35%;
    height:100%;
    background:#1DB954;
    border-radius:10px;
    box-shadow:0 0 10px #1DB954;
}

.time{
    width:300px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    color:#aaa;
    font-size:14px;
}

/* CONTROLS */

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-top:30px;
}

.controls button{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:#1DB954;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

.controls button:hover{
    transform:scale(1.1);
    box-shadow:0 0 15px #1DB954;
}

.play-btn{
    width:75px !important;
    height:75px !important;
    font-size:28px !important;
}

.music-nav{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
}

.music-nav button{
    width:50px;
    height:50px;

    border:none;
    border-radius:50%;

    background:#222;

    color:white;

    font-size:20px;

    cursor:pointer;

    transition:0.3s;
}

.music-nav button:hover{
    background:#1DB954;
    transform:translateY(-5px);
    box-shadow:0 0 15px #1DB954;
}

</style>
</head>

<body>

<div class="box">

    <div class="logo">
        <img src="spotify.png" alt="Spotify Logo">
        <h1>Spotify</h1>
    </div>

    <div class="album-box">
        <img src="image.png" alt="Album Cover">
    </div>

    <div class="name">
        <h2>Shape of You</h2>
        <p>Ed Sheeran</p>
    </div>

    <div class="progress-bar">
        <div class="progress"></div>
    </div>

    <div class="time">
        <span>1:15</span>
        <span>3:45</span>
    </div>

    <div class="controls">
        <button>⏮</button>
        <button class="play-btn">▶</button>
        <button>⏭</button>
    </div>

    <div class="music-nav">
    <button>❤️</button>
    <button>🔀</button>
    <button>🔁</button>
    <button>🔊</button>
</div>

</div>

</body>
</html>
